title = "Hersymispiste"
baseURL = "https://gohugo-theme-ananke.pages.dev"
languageCode = "fi"
theme = "ananke"
resourceDir = "../resources"

DefaultContentLanguage = "fi"
SectionPagesMenu = "main"
pagination.PagerSize = 3               # this is set low for demonstrating with dummy content. Set to a higher number
googleAnalytics = "G-QCXNCGR2C9"
enableRobotsTXT = true

[sitemap]
changefreq = "monthly"
priority = 0.5
filename = "sitemap.xml"

[params]
featured_image = "img/cover.jpg" # Path to your banner image
text_color = ""
